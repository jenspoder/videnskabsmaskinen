AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Videnskabsmaskinen — crawler, API og artikel-processor

Parameters:
  BonzaiBaseUrl:
    Type: String
    Default: https://placeholder
  BonzaiApiKey:
    Type: String
    Default: placeholder
    NoEcho: true
  BonzaiModel:
    Type: String
    Default: gpt-4o
  WordpressUrl:
    Type: String
    Default: https://placeholder
  WordpressUser:
    Type: String
    Default: placeholder
  WordpressAppPassword:
    Type: String
    Default: placeholder
    NoEcho: true

Globals:
  Function:
    Runtime: nodejs22.x
    # 900s = 15 min: nødvendigt for async self-invoke worker, der venter
    # på Bonzai-assistenten (typisk 30-90s, men variabelt). HTTP-kald er
    # stadig begrænset til API Gateway HTTP API's hårde 30s.
    Timeout: 900
    MemorySize: 256
    Environment:
      Variables:
        BUCKET: !Ref ArticlesBucket

Resources:

  # ── S3 ──────────────────────────────────────────────────────────────────────
  ArticlesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: videnskabsmaskinen-articles

  # ── Lambda ──────────────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: videnskabsmaskinen-api
      Handler: dist/handler.handler
      CodeUri: ../backend/
      Description: Håndterer alle API-kald og artikel-behandling
      Environment:
        Variables:
          BONZAI_BASE_URL: !Ref BonzaiBaseUrl
          BONZAI_API_KEY: !Ref BonzaiApiKey
          BONZAI_MODEL: !Ref BonzaiModel
          WORDPRESS_URL: !Ref WordpressUrl
          WORDPRESS_USER: !Ref WordpressUser
          WORDPRESS_APP_PASSWORD: !Ref WordpressAppPassword
      Events:
        HttpApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ScheduledCrawl:
          Type: Schedule
          Properties:
            Schedule: rate(6 hours)
            Description: Kør crawler automatisk hver 6. time
            Enabled: true
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArticlesBucket
        # Self-invoke for async generation pattern: Lambda kalder sig selv
        # via InvokeCommand med InvocationType=Event for at undgå API
        # Gateway's 30s-timeout. Se backend/prompts/bonzai-setup.md.
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:videnskabsmaskinen-api'

  # ── API Gateway ──────────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  BucketName:
    Description: S3 bucket navn
    Value: !Ref ArticlesBucket
